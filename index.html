<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Name }} - Social Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-gray-800 rounded-2xl shadow-2xl p-8 max-w-md w-full text-center border border-gray-700">
        
        <div class="relative w-32 h-32 mx-auto mb-4">
            <img src="{{ .ImageURL }}" alt="Foto Profil" class="rounded-full w-full h-full object-cover border-4 border-blue-500 shadow-lg">
            <div class="absolute bottom-0 right-0 bg-green-500 w-6 h-6 rounded-full border-2 border-gray-800"></div>
        </div>

        <h1 class="text-2xl font-bold mb-1">{{ .Name }}</h1>
        <p class="text-gray-400 text-sm mb-6">{{ .Bio }}</p>

        <div class="space-y-3">
            {{ range .Links }}
            <a href="{{ .URL }}" target="_blank" class="flex items-center justify-center space-x-2 w-full bg-gray-700 hover:bg-blue-600 transition-all duration-300 py-3 rounded-xl font-medium shadow-md hover:-translate-y-1">
                <span class="text-xl">{{ .Icon }}</span>
                <span>{{ .Platform }}</span>
            </a>
            {{ end }}
        </div>

        <div class="mt-8 pt-4 border-t border-gray-700 text-gray-500 text-xs">
            Built with full of heart
        </div>
    </div>

</body>
</html>
